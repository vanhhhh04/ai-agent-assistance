services:
  # ─────────────────────────────────────────────
  # PostgreSQL — source cho ERP
  # FIX: bật wal_level=logical để NiFi/Debezium CDC hoạt động
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    networks:
      - dataplatform
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "shared_preload_libraries=pgoutput"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/initial_table.sql:/docker-entrypoint-initdb.d/01_initial_table.sql:ro
      - ./data/postgres-init/03_airflow_db.sh:/docker-entrypoint-initdb.d/03_airflow_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Zookeeper — quản lý Kafka metadata
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - dataplatform
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - ./data/zookeeper/data:/var/lib/zookeeper/data
      - ./data/zookeeper/log:/var/lib/zookeeper/log

  # ─────────────────────────────────────────────
  # Kafka broker
  # FIX: thêm volume để persist messages qua restart
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - dataplatform
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ./data/kafka:/var/lib/kafka/data   # FIX: persist Kafka data

  # ─────────────────────────────────────────────
  # Kafka UI
  # FIX: đổi port 8080 → 8888 để không conflict với NiFi ListenHTTP
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - dataplatform
    depends_on:
      - kafka
    ports:
      - "8888:8080"   # FIX: host 8888 → container 8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─────────────────────────────────────────────
  # Apache NiFi
  # FIX: thêm port 8181 cho ListenHTTP + volumes persist flow
  # ─────────────────────────────────────────────
  nifi:
    image: apache/nifi:1.23.2
    container_name: nifi
    networks:
      - dataplatform
    ports:
      - "8443:8443"    # HTTPS UI
      - "8181:8181"    # ListenHTTP processor (cho Payment webhook)
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminadminadmin
      NIFI_WEB_HTTPS_PORT: 8443
    volumes:
      - ./nifi/logs:/opt/nifi/nifi-current/logs
      - ./nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ./nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - ./nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - csv_shared:/opt/nifi/csv_input                    # FIX: shared CSV volume
    depends_on:
      - kafka
      - postgres

  # ─────────────────────────────────────────────
  # HDFS Namenode
  # ─────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    networks:
      - dataplatform
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: local-cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - ./hdfs/namenode:/hadoop/dfs/name

  # ─────────────────────────────────────────────
  # HDFS Datanode
  # ─────────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    networks:
      - dataplatform
    depends_on:
      - namenode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: "namenode:9870"
    volumes:
      - ./hdfs/datanode:/hadoop/dfs/data

  # ─────────────────────────────────────────────
  # Spark Master
  # ─────────────────────────────────────────────
  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    networks:
      - dataplatform
    ports:
      - "8090:8080"    # Spark UI
      - "7077:7077"    # Spark master RPC
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    volumes:
      - ./spark/jobs:/opt/bitnami/spark/jobs
      - ./spark/conf/hive-site.xml:/opt/bitnami/spark/conf/hive-site.xml:ro

  # ─────────────────────────────────────────────
  # Spark Worker
  # ─────────────────────────────────────────────
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    networks:
      - dataplatform
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./spark/jobs:/opt/bitnami/spark/jobs
      - ./spark/conf/hive-site.xml:/opt/bitnami/spark/conf/hive-site.xml:ro

  # ─────────────────────────────────────────────
  # Data source — chạy 3 scripts simulation
  # FIX: thêm NIFI_ENDPOINT + CSV_DIR + shared volume
  # ─────────────────────────────────────────────
  data-source:
    build:
      context: ./data-source
      dockerfile: Dockerfile
    container_name: data-source
    networks:
      - dataplatform
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: postgres
      NIFI_ENDPOINT: http://nifi:8181/payment-events    # FIX: trỏ vào NiFi container
      CSV_DIR: /app/csv_output                          # FIX: set CSV path explicit
    working_dir: /app
    volumes:
      - ./data-source:/app
      - csv_shared:/app/csv_output                      # FIX: shared volume với NiFi
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    command: sleep infinity

  # ─────────────────────────────────────────────
  # Debezium Kafka Connect — PostgreSQL CDC for ERP source
  # Reads WAL from postgres → publishes to erp.public.{table} topics
  # REST API: http://localhost:8083
  # ─────────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka-connect
    networks:
      - dataplatform
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium.connect.configs
      OFFSET_STORAGE_TOPIC: debezium.connect.offsets
      STATUS_STORAGE_TOPIC: debezium.connect.statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # Hive Metastore PostgreSQL
  # Separate DB from ERP postgres — stores Hive table/schema definitions
  # ─────────────────────────────────────────────
  hive-metastore-db:
    # postgres:13 is the last major version that defaults to MD5 auth.
    # bde2020/hive ships a JDBC driver from 2016 that cannot speak SCRAM-SHA-256
    # (the default in postgres:14+), so we stay on 13 for the metastore only.
    # The ERP postgres stays on 15 — it talks to modern clients (Debezium, Airflow).
    image: postgres:13
    container_name: hive-metastore-db
    networks:
      - dataplatform
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Hive Metastore — thrift://hive-metastore:9083
  # Spark and AI Agent register/discover Gold tables here
  # ─────────────────────────────────────────────
  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    networks:
      - dataplatform
    # Run init.sh mounted from host — the bde2020 entrypoint does `exec $@`
    # unquoted, which re-splits args, so complex inline commands break.
    # A script file passes as exactly 2 tokens (bash, /init.sh) and is safe.
    command: ["bash", "/init.sh"]
    environment:
      SERVICE_PRECONDITION: "namenode:9870 hive-metastore-db:5432"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-db:5432/metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive"
      HIVE_SITE_CONF_hive_metastore_schema_verification: "false"
      HIVE_SITE_CONF_hive_metastore_uris: "thrift://hive-metastore:9083"
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: "hdfs://namenode:9000/user/hive/warehouse"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      HDFS_CONF_dfs_replication: "1"
    ports:
      - "9083:9083"
    volumes:
      - ./hive/init.sh:/init.sh:ro
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_started

  # ─────────────────────────────────────────────
  # HiveServer2 — JDBC endpoint on port 10000
  # AI Agent queries Gold tables through this service
  # Web UI: http://localhost:10002
  # ─────────────────────────────────────────────
  hiveserver2:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hiveserver2
    networks:
      - dataplatform
    command: /opt/hive/bin/hiveserver2
    environment:
      SERVICE_PRECONDITION: "hive-metastore:9083"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-db:5432/metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive"
      HIVE_SITE_CONF_hive_metastore_uris: "thrift://hive-metastore:9083"
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: "hdfs://namenode:9000/user/hive/warehouse"
      HIVE_SITE_CONF_hive_server2_thrift_bind_host: "0.0.0.0"
      HIVE_SITE_CONF_hive_server2_webui_port: "10002"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      HDFS_CONF_dfs_replication: "1"
    ports:
      - "10000:10000"   # JDBC/Thrift — AI Agent connects here
      - "10002:10002"   # HiveServer2 Web UI
    depends_on:
      - hive-metastore
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/10000' 2>/dev/null && echo ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # Airflow — pipeline orchestration
  # Runs Bronze→Silver→Gold on schedule via SparkSubmitOperator
  # ─────────────────────────────────────────────
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-init
    networks:
      - dataplatform
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50YnVs="
      AIRFLOW__WEBSERVER__SECRET_KEY: "graduation-project-secret"
    command: bash -c "airflow db upgrade && (airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@local.dev --password admin123 || true)"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    networks:
      - dataplatform
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50YnVs="
      AIRFLOW__WEBSERVER__SECRET_KEY: "graduation-project-secret"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark-master:7077"
      SPARK_HOME: "/home/airflow/.local/lib/python3.8/site-packages/pyspark"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/spark_jobs
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      - airflow-init
      - postgres
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    networks:
      - dataplatform
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50YnVs="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark-master:7077"
      SPARK_HOME: "/home/airflow/.local/lib/python3.8/site-packages/pyspark"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/spark_jobs
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      - airflow-init
      - postgres

networks:
  dataplatform:
    driver: bridge

volumes:
  csv_shared:           # shared volume: data-source ↔ nifi (warehouse CSV pipeline)
  ollama_models:
  hive_metastore_db:    # Hive Metastore schema (PostgreSQL data)
  airflow_logs:         # Airflow task logs
